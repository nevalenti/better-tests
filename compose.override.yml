services:
  api:
    build:
      dockerfile: apps/BetterTests/Dockerfile.dev
    ports:
      - "5000:5000"
    depends_on:
      terraform:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
      OpenTelemetry__ExporterType: console
      KC_PROXY: ""
      Keycloak__Url: "http://keycloak:8080"
      Serilog__WriteTo__2__Args__serverUrl: "http://seq:5341"
    volumes:
      - ./:/app
    working_dir: /app

  web:
    build:
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "4200:4200"
    volumes:
      - ./:/app
      - /app/node_modules
      - ./nx.web.json:/app/nx.json:ro
    working_dir: /app

  postgres:
    ports:
      - "${POSTGRES_PORT}:5432"

  keycloak:
    command:
      - start-dev
      - --http-management-port=9000
    ports:
      - "${KEYCLOAK_PORT}:8080"
    environment:
      KC_PROXY: ""

  migrate:
    build:
      dockerfile: apps/BetterTests/Dockerfile.migrate

  mailhog:
    image: mailhog/mailhog:latest
    container_name: better-tests-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: better-tests-pgweb
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "5050:8081"
    depends_on:
      postgres:
        condition: service_healthy

  terraform:
    image: hashicorp/terraform:latest
    container_name: better-tests-terraform
    working_dir: /terraform
    volumes:
      - ./terraform:/terraform
    environment:
      TF_VAR_keycloak_url: "http://keycloak:8080"
    entrypoint: ["sh", "-c", "terraform init && terraform apply -auto-approve -var='keycloak_url=http://keycloak:8080'"]
    depends_on:
      keycloak:
        condition: service_healthy

  seq:
    image: datalust/seq:latest
    container_name: better-tests-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "5341:5341"
      - "5380:80"
    volumes:
      - seq_data:/data

volumes:
  seq_data:
